name: RhinoLens
options:
  bundleIdPrefix: io.github.kiranshny
  deploymentTarget:
    iOS: "17.4"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: bottom

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  RhinoLens:
    type: application
    platform: iOS
    deploymentTarget: "17.4"
    sources:
      - path: iosApp
        excludes:
          - "Resources/Info.plist"
    info:
      path: iosApp/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        NSCameraUsageDescription: RhinoLens needs camera access to translate text in real time.
        NSPhotoLibraryUsageDescription: RhinoLens needs access to your photos to translate text from existing images.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.kiranshny.rhinolens
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(BUILT_PRODUCTS_DIR)"
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/Frameworks"
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-framework Shared"
    preBuildScripts:
      - name: Build Kotlin Shared Framework
        script: |
          cd "$SRCROOT/.."
          ./gradlew :shared:embedAndSignAppleFrameworkForXcode
        basedOnDependencyAnalysis: false
    dependencies:
      - framework: $(BUILT_PRODUCTS_DIR)/Shared.framework
        embed: true
        codeSign: true
